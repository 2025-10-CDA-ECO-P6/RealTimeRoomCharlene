services:
  - type: web
    name: chat-api
    runtime: docker
    plan: free
    dockerfilePath: ./monorepo-chat/api/Dockerfile
    dockerContext: ./monorepo-chat/api
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  - type: web
    name: chat-web
    runtime: docker
    plan: free
    dockerfilePath: ./monorepo-chat/web/Dockerfile
    dockerContext: ./monorepo-chat/web
    envVars:
      - key: VITE_API_URL
        value: https://chat-api.onrender.com