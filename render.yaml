services:
  - type: web
    name: chat-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  - type: web
    name: chat-web
    runtime: docker
    dockerfilePath: ./web/Dockerfile
    dockerContext: ./web
    envVars:
      - key: VITE_API_URL
        value: https://chat-api.onrender.com