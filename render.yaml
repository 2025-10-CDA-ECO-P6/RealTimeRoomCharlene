services:
  - type: web
    name: chat-api
    runtime: docker
    plan: free
    dockerfilePath: ./monorepo-chat/api/Dockerfile
    dockerContext: ./
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  - type: web
    name: chat-web
    runtime: docker
    plan: free
    dockerfilePath: ./monorepo-chat/web/Dockerfile
    dockerContext: ./
    dockerBuildArgs:
      - key: VITE_API_URL
        value: https://chat-api-eepo.onrender.com
    envVars:
      - key: VITE_API_URL
        value: https://chat-api-eepo.onrender.com