server {
    listen 80;

    # Serve les fichiers statiques buildés par Vite
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback : toute route inconnue renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST vers l'API (évite les problèmes CORS en prod)
    location /api/ {
        proxy_pass http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket — les headers Upgrade sont obligatoires
    location /socket.io/ {
        proxy_pass http://api:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}